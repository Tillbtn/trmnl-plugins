polling_verb: get
framework_version: latest
# Statischer, interpolationsfreier "Trigger": Larapaper interpoliert {{ ... }} in
# der polling_url u.U. NICHT -> literaler Platzhalter -> 404 -> "Failed to fetch data".
# Daher hier nur ein kleiner, immer valider Endpoint; alle echten Daten (Changeset
# nach osm_user, Overpass-Geometrie, HDYC) holt der Transform selbst.
polling_url: https://api.openstreetmap.org/api/0.6/capabilities.json
polling_headers: 'User-Agent=trmnl-osm-dashboard/1.0 (hackathon)'
name: "Tills OSM Dashboard"
refresh_interval: 1440
custom_fields:
- keyname: osm_user
  field_type: string
  name: OSM-Benutzername
  description: Der neueste Changeset dieses Users wird angezeigt.
  default: Till_btn
- keyname: changeset_id
  field_type: string
  name: Feste Changeset-ID (optional)
  description: Überschreibt den User. Leer lassen = neuester Changeset.
  optional: true
  placeholder: "184732269"
- keyname: render_mode
  field_type: select
  name: Kartenmodus
  options:
  - "PNG (kompakt, dither-fähig): png"
  - "SVG (Vektor, scharf): svg"
  default: png
- keyname: map_style
  field_type: select
  name: Kartenstil
  options:
  - "3D-Tiefe: threed"
  - "Toner (Figur-Grund): toner"
  - "Kupferstich (Schraffur): hachure"
  - "Blueprint (invertiert): blueprint"
  default: threed
- keyname: map_config
  field_type: code
  name: Karten-Konfiguration (JSON, optional)
  description: Voller Export aus dem Prototyp-Tuner. Wenn gesetzt, überschreibt er den Kartenstil oben.
  rows: 6
  optional: true
- keyname: show_edits
  field_type: boolean
  name: Bearbeitungen hervorheben
  description: Aus = nur Hintergrundkarte (spart 2 API-Aufrufe).
  default: true
- keyname: show_streak
  field_type: boolean
  name: Streak-Box anzeigen
  description: Große Streak-Box oben rechts (HDYC).
  default: true
- keyname: show_kpi
  field_type: boolean
  name: KPI-Leiste anzeigen
  description: Statistik-Leiste unten links (HDYC). Streak/KPI aus = spart 1 API-Aufruf.
  default: true
- keyname: show_header
  field_type: boolean
  name: Changeset-Überschrift anzeigen
  description: Aus = Kopf-Box (Changeset-ID/Kommentar) oben links ausblenden.
  default: true
